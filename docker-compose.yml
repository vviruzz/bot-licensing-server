version: '3.9'
services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  admin:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env.example
    ports:
      - "5173:5173"
    volumes:
      - ./admin:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
